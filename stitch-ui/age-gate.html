<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>iPee - Age Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#0ddff2",
                "background-light": "#f5f8f8",
                "background-dark": "#0d0d1a",
              },
              fontFamily: {
                "display": ["Space Grotesk", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .neon-glow {
            text-shadow: 0 0 10px rgba(13, 223, 242, 0.8), 0 0 20px rgba(13, 223, 242, 0.4);
        }
        .bg-glow {
            background: radial-gradient(circle at center, rgba(13, 223, 242, 0.15) 0%, rgba(13, 13, 26, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col items-center justify-center bg-background-light dark:bg-background-dark p-6 overflow-hidden">
<!-- Background Ambient Glow -->
<div class="absolute inset-0 bg-glow pointer-events-none"></div>
<!-- Main Container -->
<div class="relative z-10 w-full max-w-md flex flex-col items-center text-center">
<!-- Icon Section -->
<div class="mb-6">
<div class="text-[80px] leading-none mb-2 drop-shadow-[0_0_15px_rgba(13,223,242,0.3)]">🚽</div>
</div>
<!-- Title Section -->
<h1 class="text-slate-100 text-6xl font-bold tracking-tight mb-2 neon-glow">
                iPee
            </h1>
<!-- Subtitle Section -->
<h2 class="text-slate-100 text-2xl font-medium tracking-tight mt-8 mb-10">
                Are you 18 or older?
            </h2>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4 w-full px-4">
<button onclick="window.parent.postMessage('age:yes','*')" class="flex-1 flex min-h-[60px] cursor-pointer items-center justify-center rounded-full bg-primary px-8 text-background-dark text-lg font-bold uppercase tracking-wider shadow-[0_0_20px_rgba(13,223,242,0.5)] active:scale-95 transition-transform">
<span>YES, I AM 18+</span>
</button>
<button onclick="window.parent.postMessage('age:no','*')" class="flex-1 flex min-h-[60px] cursor-pointer items-center justify-center rounded-full bg-slate-800/50 border border-slate-700 px-8 text-slate-300 text-lg font-bold uppercase tracking-wider active:scale-95 transition-transform">
<span>NO</span>
</button>
</div>
<!-- Footer Section -->
<div class="mt-12">
<p class="text-slate-500 text-sm font-medium leading-relaxed max-w-[280px]">
                    This game is intended for adults only.
                </p>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute bottom-[-10%] left-[-10%] w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
</div>
</body></html>
