<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#0ddff2",
                    "accent-gold": "#ffd700",
                    "background-dark": "#102122",
                },
                fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<style>
    .hexagon-mask { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
    .neon-glow-gold { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
    .neon-glow-cyan { box-shadow: 0 0 15px rgba(13, 223, 242, 0.4); }
    body { min-height: max(640px, 100dvh); }

    @keyframes pop-in {
        0%   { transform: scale(0.5); opacity: 0; }
        70%  { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%      { transform: translateY(-8px); }
    }
    .animate-pop-in  { animation: pop-in 0.5s ease-out forwards; }
    .animate-float   { animation: float 2.4s ease-in-out infinite; }
    .confetti {
        position: absolute;
        width: 8px; height: 8px;
        border-radius: 2px;
        animation: fall linear infinite;
    }
    @keyframes fall {
        0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
        100% { transform: translateY(660px) rotate(720deg); opacity: 0; }
    }
</style>
</head>
<body class="bg-background-dark font-display antialiased text-slate-100 flex justify-center items-center min-h-screen">
<div class="relative w-[360px] h-[640px] bg-background-dark overflow-hidden flex flex-col border border-accent-gold/30 shadow-2xl" style="box-shadow: 0 0 40px rgba(255,215,0,0.15);">

  <!-- Confetti particles (injected by JS below) -->
  <div id="confetti-container"></div>

  <!-- Header -->
  <div class="flex items-center justify-between p-4 z-10">
    <div class="w-7"></div>
    <h2 class="text-primary text-xl font-bold tracking-widest uppercase italic">iPee</h2>
    <div class="w-7"></div>
  </div>

  <!-- Trophy emoji + celebration -->
  <div class="flex flex-col items-center pt-4 pb-2 z-10">
    <div class="text-6xl animate-float mb-2">🏆</div>
    <div class="text-accent-gold text-xs font-bold tracking-widest uppercase mb-1">Achievement Unlocked</div>
  </div>

  <!-- Completion badge -->
  <div class="flex flex-col items-center pb-6 z-10">
    <div class="relative flex items-center justify-center w-36 h-36 animate-pop-in">
      <div class="absolute inset-0 bg-accent-gold hexagon-mask opacity-25 blur-md"></div>
      <div class="absolute inset-2 bg-background-dark border-2 border-accent-gold hexagon-mask flex flex-col items-center justify-center shadow-[inset_0_0_15px_rgba(255,215,0,0.6)] neon-glow-gold">
        <span class="text-accent-gold text-3xl leading-none">✓</span>
      </div>
    </div>
  </div>

  <!-- Title -->
  <div class="px-6 text-center z-10">
    <h1 id="level-complete-title" class="text-slate-100 text-2xl font-black tracking-tight leading-tight">
      Level 1 Complete!
    </h1>
    <p class="text-primary text-sm font-medium mt-1 tracking-wide">Excellent aim! 🎯</p>
  </div>

  <!-- Stats card -->
  <div class="px-6 mt-4 flex-grow z-10">
    <div class="bg-primary/5 border border-primary/40 rounded-xl p-4 neon-glow-cyan">
      <h3 class="text-primary text-xs font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
        <span class="material-symbols-outlined" style="font-size:16px">monitoring</span>
        Result
      </h3>
      <div class="flex items-center justify-center gap-3 py-2">
        <span class="text-4xl">💥</span>
        <div class="text-left">
          <div class="text-slate-100 text-lg font-bold">All bombs destroyed!</div>
          <div class="text-slate-400 text-xs font-medium">Level cleared successfully</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Next Level Button -->
  <div class="p-6 pt-4 z-10">
    <button onclick="window.parent.postMessage('level:next','*')"
      class="w-full bg-primary text-background-dark font-black text-lg py-4 rounded-lg flex items-center justify-center gap-2 uppercase tracking-tighter hover:brightness-110 active:scale-95 transition-all"
      style="box-shadow: 0 0 20px rgba(13,223,242,0.6);">
      <span id="next-btn-text">Next Level →</span>
      <span class="material-symbols-outlined font-black">arrow_forward</span>
    </button>
  </div>

  <!-- Background decorations -->
  <div class="absolute -bottom-10 -left-10 size-40 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute -top-10 -right-10 size-40 bg-accent-gold/10 rounded-full blur-3xl pointer-events-none"></div>
</div>

<script>
    // Populate from URL params (?level=N&last=0|1)
    ;(function () {
      const p    = new URLSearchParams(location.search)
      const lvl  = p.get('level')
      const last = p.get('last') === '1'
      if (lvl)  document.getElementById('level-complete-title').textContent = `Level ${lvl} Complete!`
      if (last) document.getElementById('next-btn-text').textContent = 'Play Again'
    })()
</script>
<script>
    // Spawn confetti
    const colors = ['#0ddff2', '#ffd700', '#ff6b6b', '#a8ff78', '#ff9f43']
    const container = document.getElementById('confetti-container')
    for (let i = 0; i < 22; i++) {
        const el = document.createElement('div')
        el.className = 'confetti'
        el.style.left            = Math.random() * 360 + 'px'
        el.style.top             = '-10px'
        el.style.background      = colors[i % colors.length]
        el.style.animationDelay  = (Math.random() * 2.5) + 's'
        el.style.animationDuration = (2 + Math.random() * 2) + 's'
        container.appendChild(el)
    }
</script>
</body>
</html>
