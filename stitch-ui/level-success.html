<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#0ddff2",
                    "accent-gold": "#ffd700",
                    "background-dark": "#102122",
                },
                fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<style>
    .neon-glow-cyan { box-shadow: 0 0 15px rgba(13, 223, 242, 0.4); }
    body { min-height: max(640px, 100dvh); }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .animate-float { animation: float 2.4s ease-in-out infinite; }

    @keyframes star-pop {
        0%   { transform: scale(0) rotate(-20deg); opacity:0; }
        60%  { transform: scale(1.3) rotate(5deg);  opacity:1; }
        100% { transform: scale(1)   rotate(0deg);  opacity:1; }
    }
    .star { display:inline-block; font-size:42px; opacity:0; }
    .star.filled { animation: star-pop 0.45s cubic-bezier(.36,.07,.19,.97) forwards; }

    .confetti { position:absolute; width:8px; height:8px; border-radius:2px; animation:fall linear infinite; }
    @keyframes fall {
        0%   { transform:translateY(-20px) rotate(0deg);   opacity:1; }
        100% { transform:translateY(660px) rotate(720deg); opacity:0; }
    }
</style>
</head>
<body class="bg-background-dark font-display antialiased text-slate-100 flex justify-center items-center min-h-screen">
<div class="relative w-[360px] h-[640px] bg-background-dark overflow-hidden flex flex-col border border-accent-gold/30 shadow-2xl" style="box-shadow:0 0 40px rgba(255,215,0,0.15)">

  <div id="confetti-container"></div>

  <!-- Header -->
  <div class="flex items-center justify-between p-4 z-10">
    <div class="w-7"></div>
    <h2 class="text-primary text-xl font-bold tracking-widest uppercase italic">iPee</h2>
    <div class="w-7"></div>
  </div>

  <!-- Trophy -->
  <div class="flex flex-col items-center pt-2 pb-2 z-10">
    <div class="text-5xl animate-float mb-1">🏆</div>
    <div class="text-accent-gold text-xs font-bold tracking-widest uppercase">Level Complete!</div>
  </div>

  <!-- Level number -->
  <div class="flex justify-center pb-4 z-10">
    <h1 id="level-title" class="text-slate-100 text-2xl font-black tracking-tight">Level 1</h1>
  </div>

  <!-- Stars Row -->
  <div class="flex justify-center items-center gap-4 pb-2 z-10">
    <span id="star-1" class="star">&#9734;</span>
    <span id="star-2" class="star">&#9734;</span>
    <span id="star-3" class="star">&#9734;</span>
  </div>
  <div id="star-label" class="text-center text-xs text-slate-400 pb-4 z-10"></div>

  <!-- Result Card -->
  <div class="px-6 flex-grow z-10">
    <div class="bg-primary/5 border border-primary/40 rounded-xl p-4 neon-glow-cyan">
      <h3 class="text-primary text-xs font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
        <span class="material-symbols-outlined" style="font-size:16px">monitoring</span>
        Result
      </h3>
      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <span class="text-slate-400 text-sm">Completion Time</span>
          <span id="elapsed-time" class="text-slate-100 font-bold">-</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-slate-400 text-sm">All Bombs</span>
          <span class="text-slate-100 font-bold">&#128165; Destroyed!</span>
        </div>
      </div>
      <!-- Star guide -->
      <div class="mt-3 pt-3 border-t border-primary/20">
        <div id="star-guide" class="text-slate-500 text-xs text-center"></div>
      </div>
    </div>
  </div>

  <!-- Back to Menu Button -->
  <div class="p-6 pt-4 z-10">
    <button onclick="window.parent.postMessage('level:next','*')"
      class="w-full bg-primary text-background-dark font-black text-lg py-4 rounded-lg flex items-center justify-center gap-2 uppercase tracking-tighter hover:brightness-110 active:scale-95 transition-all"
      style="box-shadow:0 0 20px rgba(13,223,242,0.6)">
      Back to Menu
      <span class="material-symbols-outlined font-black">home</span>
    </button>
  </div>

  <div class="absolute -bottom-10 -left-10 size-40 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute -top-10 -right-10 size-40 bg-accent-gold/10 rounded-full blur-3xl pointer-events-none"></div>
</div>

<script>
  ;(function () {
    const p         = new URLSearchParams(location.search)
    const lvl       = parseInt(p.get('level') || '1')
    const stars     = parseInt(p.get('stars') || '1')
    const elapsedMs = parseInt(p.get('elapsedMs') || '0')

    document.getElementById('level-title').textContent = 'Level ' + lvl

    // Elapsed time
    document.getElementById('elapsed-time').textContent = (elapsedMs / 1000).toFixed(1) + 's'

    // Star feedback labels
    const labels = ['', 'Keep practicing!', 'Nice aim!', 'Perfect!']
    document.getElementById('star-label').textContent = labels[Math.min(stars, 3)] || ''

    // Animate earned stars with stagger; grey out unearned
    for (var i = 1; i <= 3; i++) {
      var el = document.getElementById('star-' + i)
      if (i <= stars) {
        el.textContent = '\u2B50'  // filled star emoji
        el.style.color = '#ffd700'
        ;(function(elem, delay) {
          setTimeout(function() { elem.classList.add('filled') }, 300 + delay * 250)
        })(el, i - 1)
      } else {
        el.textContent = '\u2606'  // hollow star
        el.style.color = '#334155'
        el.style.opacity = '0.35'
        el.style.animation = 'none'
        el.style.transform = 'scale(1)'
        setTimeout(function(e){ e.style.opacity='0.35' }.bind(null, el), 50)
      }
    }

    // Star guide hint
    var guideEl = document.getElementById('star-guide')
    if (stars < 3) {
      guideEl.textContent = stars === 2 ? 'Aim a bit faster for 3 stars!' : 'Aim faster for more stars!'
    } else {
      guideEl.textContent = 'Maximum stars \u2014 flawless!'
    }

    // Confetti only on 3 stars
    if (stars === 3) {
      var colors    = ['#0ddff2','#ffd700','#ff6b6b','#a8ff78','#ff9f43']
      var container = document.getElementById('confetti-container')
      for (var j = 0; j < 22; j++) {
        var c = document.createElement('div')
        c.className = 'confetti'
        c.style.left              = Math.random() * 360 + 'px'
        c.style.top               = '-10px'
        c.style.background        = colors[j % colors.length]
        c.style.animationDelay    = (Math.random() * 2.5) + 's'
        c.style.animationDuration = (2 + Math.random() * 2) + 's'
        container.appendChild(c)
      }
    }
  })()
</script>
</body>
</html>
