<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ddff2",
                        "accent-gold": "#ffd700",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102122",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .neon-glow-cyan {
            box-shadow: 0 0 15px rgba(13, 223, 242, 0.4);
        }
        .neon-glow-gold {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .hexagon-mask {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 flex justify-center items-center min-h-screen">
<!-- Mobile Container (360x640 Simulation) -->
<div class="relative w-[360px] h-[640px] bg-background-dark overflow-hidden flex flex-col border border-primary/20 shadow-2xl">
<!-- Header with Menu Icon -->
<div class="flex items-center justify-between p-4 z-10">
<div class="text-primary material-symbols-outlined cursor-pointer" style="font-size: 28px;">menu</div>
<h2 class="text-primary text-xl font-bold tracking-widest uppercase italic">iPee</h2>
<div class="w-7"></div> <!-- Spacer for balance -->
</div>
<!-- Top Section: Hexagonal Badge -->
<div class="flex flex-col items-center pt-4 pb-6">
<div class="relative flex items-center justify-center w-32 h-32">
<!-- Hexagon Glow Outer -->
<div class="absolute inset-0 bg-accent-gold hexagon-mask opacity-20 blur-md"></div>
<!-- Hexagon Shape -->
<div class="absolute inset-2 bg-background-dark border-2 border-accent-gold hexagon-mask flex flex-col items-center justify-center shadow-[inset_0_0_10px_rgba(255,215,0,0.5)]">
<span class="text-xs font-bold text-accent-gold/80 tracking-tighter uppercase">Level</span>
<span class="text-4xl font-bold text-slate-100 leading-none">1</span>
</div>
</div>
</div>
<!-- Progress Section: Circular XP Bar -->
<div class="flex flex-col items-center mb-8">
<div class="relative size-32">
<!-- Circular Track -->
<svg class="size-full -rotate-90" viewbox="0 0 36 36">
<circle class="stroke-primary/10" cx="18" cy="18" fill="none" r="16" stroke-width="2.5"></circle>
<!-- Progress (0% Filled) -->
<circle class="stroke-primary" cx="18" cy="18" fill="none" r="16" stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round" stroke-width="2.5"></circle>
</svg>
<!-- Center Text -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="text-lg font-bold text-slate-100 leading-none">0/100</span>
<span class="text-[10px] text-primary font-medium tracking-widest uppercase">XP</span>
</div>
</div>
</div>
<!-- Middle Section: User Statistics Card -->
<div class="px-6 flex-grow">
<div class="bg-primary/5 border border-primary/40 rounded-xl p-5 neon-glow-cyan">
<h3 class="text-primary text-xs font-bold uppercase tracking-widest mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">monitoring</span>
                    User Statistics
                </h3>
<div class="space-y-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-size: 20px;">target</span>
<span class="text-slate-300 text-sm font-medium">Best Streak</span>
</div>
<span class="text-slate-100 font-bold">0s</span>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-size: 20px;">water_drop</span>
<span class="text-slate-300 text-sm font-medium">Total Hits</span>
</div>
<span class="text-slate-100 font-bold">0</span>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-size: 20px;">grade</span>
<span class="text-slate-300 text-sm font-medium">High Score</span>
</div>
<span class="text-slate-100 font-bold">0 pts</span>
</div>
</div>
</div>
</div>
<!-- Bottom Section: Play Button -->
<div class="p-6">
<button onclick="window.parent.postMessage('play','*')" class="w-full bg-primary text-background-dark font-black text-lg py-4 rounded-lg flex items-center justify-center gap-2 uppercase tracking-tighter shadow-[0_0_20px_rgba(13,223,242,0.6)] hover:brightness-110 active:scale-95 transition-all">
                Play Now
                <span class="material-symbols-outlined font-black">arrow_forward</span>
</button>
</div>
<!-- Background Decorations -->
<div class="absolute -bottom-10 -left-10 size-40 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-1/4 -right-10 size-32 bg-accent-gold/5 rounded-full blur-3xl pointer-events-none"></div>
</div>
</body></html>
