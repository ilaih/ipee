<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#0ddff2",
                    "accent-gold": "#ffd700",
                    "background-dark": "#102122",
                },
                fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<style>
    .neon-glow-cyan { box-shadow: 0 0 15px rgba(13, 223, 242, 0.4); }
    .hexagon-mask   { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
    body            { min-height: max(640px, 100dvh); }

    /* Settings drawer */
    #settings-drawer {
        position: absolute; inset: 0; z-index: 50;
        background: rgba(0,0,0,0.6);
        display: none; align-items: flex-start; justify-content: flex-start;
    }
    #settings-drawer.open { display: flex; }
    #drawer-panel {
        width: 260px; height: 100%;
        background: #0d1e1f;
        border-right: 1px solid rgba(13,223,242,0.2);
        padding: 20px 16px;
        display: flex; flex-direction: column; gap: 0;
    }

    /* Toggle switch */
    .toggle-wrap { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
    .toggle-label { color:#cbd5e1; font-size:14px; font-weight:500; }
    .toggle { position:relative; display:inline-block; width:42px; height:24px; }
    .toggle input { opacity:0; width:0; height:0; }
    .slider { position:absolute; cursor:pointer; inset:0; background:#334155; border-radius:24px; transition:.3s; }
    .slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.3s; }
    input:checked + .slider { background:#0ddff2; }
    input:checked + .slider:before { transform:translateX(18px); }
</style>
</head>
<body class="bg-background-dark font-display antialiased text-slate-100 flex justify-center items-center min-h-screen">
<div class="relative w-[360px] h-[640px] bg-background-dark overflow-hidden flex flex-col border border-primary/20 shadow-2xl">

  <!-- Settings Drawer (slides over content) -->
  <div id="settings-drawer" onclick="closeDrawer(event)">
    <div id="drawer-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <span style="color:#0ddff2;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.1em">Menu</span>
        <button onclick="closeDrawer()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:20px;line-height:1">✕</button>
      </div>

      <!-- Player ID -->
      <div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
        <div style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Player ID</div>
        <div id="drawer-player-id" style="color:#94a3b8;font-size:12px;font-family:monospace;word-break:break-all">-</div>
      </div>

      <!-- Sound toggle -->
      <div class="toggle-wrap">
        <span class="toggle-label">Sound</span>
        <label class="toggle">
          <input type="checkbox" id="sound-toggle" checked onchange="onSoundToggle(this.checked)"/>
          <span class="slider"></span>
        </label>
      </div>

      <!-- Full Settings link -->
      <button onclick="window.parent.postMessage('open:settings','*')"
        style="margin-top:16px;width:100%;padding:10px;background:rgba(13,223,242,0.08);border:1px solid rgba(13,223,242,0.25);border-radius:8px;color:#0ddff2;font-size:13px;font-weight:600;cursor:pointer;text-align:center">
        Advanced Settings
      </button>
    </div>
  </div>

  <!-- Header -->
  <div class="flex items-center justify-between p-4 z-10">
    <button onclick="openDrawer()" style="background:none;border:none;cursor:pointer;padding:0">
      <span class="material-symbols-outlined text-primary" style="font-size:28px">menu</span>
    </button>
    <h2 class="text-primary text-xl font-bold tracking-widest uppercase italic">iPee</h2>
    <div class="w-7"></div>
  </div>

  <!-- Player Level Hexagon -->
  <div class="flex flex-col items-center pt-2 pb-4">
    <div class="relative flex items-center justify-center w-32 h-32">
      <div class="absolute inset-0 bg-accent-gold hexagon-mask opacity-20 blur-md"></div>
      <div class="absolute inset-2 bg-background-dark border-2 border-accent-gold hexagon-mask flex flex-col items-center justify-center shadow-[inset_0_0_10px_rgba(255,215,0,0.5)]">
        <span class="text-xs font-bold text-accent-gold/80 tracking-tighter uppercase">Player</span>
        <span id="player-level" class="text-4xl font-bold text-slate-100 leading-none">1</span>
        <span class="text-xs font-bold text-accent-gold/60 tracking-tighter uppercase">Level</span>
      </div>
    </div>
    <p class="text-slate-500 text-xs mt-2">Every 5 s of aim = 1 player level</p>
  </div>

  <!-- XP Ring -->
  <div class="flex flex-col items-center mb-4">
    <div class="relative size-24">
      <svg class="size-full -rotate-90" viewBox="0 0 36 36">
        <circle class="stroke-primary/10" cx="18" cy="18" fill="none" r="16" stroke-width="2.5"/>
        <circle id="xp-circle" class="stroke-primary" cx="18" cy="18" fill="none" r="16"
          stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round" stroke-width="2.5"/>
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span id="xp-text" class="text-sm font-bold text-slate-100 leading-none">0/5000</span>
        <span class="text-[10px] text-primary font-medium tracking-widest uppercase">XP</span>
      </div>
    </div>
  </div>

  <!-- Stats Card -->
  <div class="px-6 flex-grow">
    <div class="bg-primary/5 border border-primary/40 rounded-xl p-4 neon-glow-cyan">
      <h3 class="text-primary text-xs font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">monitoring</span>
        Your Stats
      </h3>
      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary" style="font-size:18px">timer</span>
            <div>
              <div class="text-slate-300 text-sm font-medium">Best Time</div>
              <div class="text-slate-500 text-xs">Fastest level clear</div>
            </div>
          </div>
          <span id="stat-best-time" class="text-slate-100 font-bold">-</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary" style="font-size:18px">military_tech</span>
            <div>
              <div class="text-slate-300 text-sm font-medium">Levels Beaten</div>
              <div class="text-slate-500 text-xs">Games completed</div>
            </div>
          </div>
          <span id="stat-levels-beaten" class="text-slate-100 font-bold">0</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span style="font-size:18px">⭐</span>
            <div>
              <div class="text-slate-300 text-sm font-medium">Total Stars</div>
              <div class="text-slate-500 text-xs">3 stars = fastest clear</div>
            </div>
          </div>
          <span id="stat-total-stars" class="text-slate-100 font-bold">0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Play Button -->
  <div class="p-6 pt-3">
    <button id="play-btn" onclick="onPlayNow()"
      class="w-full bg-primary text-background-dark font-black text-lg py-4 rounded-lg flex flex-col items-center justify-center gap-1 uppercase tracking-tighter hover:brightness-110 active:scale-95 transition-all"
      style="box-shadow: 0 0 20px rgba(13,223,242,0.6);">
      <span class="flex items-center gap-2">
        <span id="next-level-label">Level 1</span>
        <span class="material-symbols-outlined font-black">play_arrow</span>
      </span>
      <span id="cooldown-text" style="font-size:12px;font-weight:500;letter-spacing:0;text-transform:none;opacity:0.85"></span>
    </button>
  </div>

  <!-- Background decorations -->
  <div class="absolute -bottom-10 -left-10 size-40 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute top-1/4 -right-10 size-32 bg-accent-gold/5 rounded-full blur-3xl pointer-events-none"></div>
</div>

<script>
  function onPlayNow() {
    const btn = document.getElementById('play-btn')
    if (btn && btn.hasAttribute('disabled')) return
    window.parent.postMessage('play', '*')
  }

  function openDrawer() {
    const drawer = document.getElementById('settings-drawer')
    drawer.classList.add('open')
    // Populate player ID
    try {
      const uid = localStorage.getItem('ipee_uid') || 'Not set'
      document.getElementById('drawer-player-id').textContent = uid
    } catch(_) {}
    // Populate sound toggle
    try {
      const s = JSON.parse(localStorage.getItem('ipee_settings') || '{}')
      document.getElementById('sound-toggle').checked = s.sound !== false
    } catch(_) {}
  }

  function closeDrawer(e) {
    if (e && e.target !== document.getElementById('settings-drawer')) return
    document.getElementById('settings-drawer').classList.remove('open')
  }

  function onSoundToggle(val) {
    try {
      const s = JSON.parse(localStorage.getItem('ipee_settings') || '{}')
      s.sound = val
      localStorage.setItem('ipee_settings', JSON.stringify(s))
    } catch(_) {}
  }
</script>
</body>
</html>
